services:
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - auth-service
      - user-service
      - project-service
      - task-service
      - notification-service
    networks:
      - appnet

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    env_file:
      - ./auth-service/.env
    volumes:
      - ./auth-service:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - appnet

  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "3002:3002"
    env_file:
      - ./user-service/.env
    volumes:
      - ./user-service:/app
      - /app/node_modules
    depends_on:
      - mysql
    networks:
      - appnet

  project-service:
    build: ./project-service
    container_name: project-service
    ports:
      - "3003:3003"
    env_file:
      - ./project-service/.env
    volumes:
      - ./project-service:/app
      - /app/node_modules
    depends_on:
      - mysql
      - redis
    networks:
      - appnet

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "3004:3004"
    env_file:
      - ./task-service/.env
    volumes:
      - ./task-service:/app
      - /app/node_modules
    depends_on:
      - mysql
      - redis
    networks:
      - appnet

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3005:3005"
    env_file:
      - ./notification-service/.env
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    depends_on:
      - redis
    networks:
      - appnet

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init/init:/docker-entrypoint-initdb.d:ro
    networks:
      - appnet

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - appnet

volumes:
  mysql_data:

networks:
  appnet: